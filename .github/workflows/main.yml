name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - feature-*

jobs:

  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt || true

      - name: Backend build check
        run: python -m py_compile $(git ls-files '*.py') || echo 'No Python files'

  backend-test:
    needs: backend-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run backend tests
        run: pytest || echo 'No tests'

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Frontend build
        run: echo 'Build frontend (add npm build later)'

  frontend-test:
    needs: frontend-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Frontend test
        run: echo 'Run frontend tests'

  deploy:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy app
        run: echo 'Deploying app...'

